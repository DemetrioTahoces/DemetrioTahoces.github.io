<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Topologia de domain events y colas</title>
  <desc id="desc">Diagrama visual de un domain event que llega a un exchange y dispara varias colas de accion con consumidores logicos separados.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#0f233a"/>
      <stop offset="1" stop-color="#06121f"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#84cc16"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.08"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#93c5fd"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <circle cx="1080" cy="110" r="220" fill="#22c55e" opacity="0.08"/>
  <circle cx="170" cy="635" r="260" fill="#60a5fa" opacity="0.1"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <rect x="72" y="86" width="1136" height="548" rx="24" fill="#0f172a" opacity="0.72" stroke="#60a5fa" stroke-opacity="0.18"/>
    <text x="112" y="150" fill="#e5edf7" font-size="38" font-weight="800">Domain event como contrato de hechos</text>
    <text x="112" y="190" fill="#a7b4c8" font-size="22">El evento informa. Cada cola declara la accion que ejecuta cuando ese hecho ocurre.</text>

    <g>
      <rect x="112" y="266" width="230" height="126" rx="16" fill="#111f33" stroke="#60a5fa" stroke-opacity="0.34"/>
      <text x="136" y="312" fill="#bfdbfe" font-size="18" font-weight="700">Evento de dominio</text>
      <text x="136" y="352" fill="#ffffff" font-size="30" font-weight="800">UserCreated</text>
    </g>

    <path d="M352 329H488" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>

    <g>
      <rect x="506" y="248" width="256" height="164" rx="20" fill="#0b253d" stroke="#38bdf8" stroke-opacity="0.52"/>
      <text x="538" y="294" fill="#bfdbfe" font-size="18" font-weight="700">Exchange</text>
      <text x="538" y="338" fill="#ffffff" font-size="34" font-weight="800">user-created</text>
      <text x="538" y="374" fill="#a7b4c8" font-size="18">kebab-case del hecho</text>
    </g>

    <path d="M778 300C842 272 888 260 936 252" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)" fill="none" opacity="0.9"/>
    <path d="M778 330H936" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
    <path d="M778 360C842 388 888 400 936 408" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)" fill="none" opacity="0.9"/>

    <g>
      <rect x="950" y="216" width="236" height="76" rx="14" fill="#10231d" stroke="#22c55e" stroke-opacity="0.44"/>
      <text x="976" y="248" fill="#bbf7d0" font-size="17" font-weight="700">send.email</text>
      <text x="976" y="272" fill="#e5edf7" font-size="17">send-email-on-user-created</text>
    </g>

    <g>
      <rect x="950" y="316" width="236" height="76" rx="14" fill="#10231d" stroke="#22c55e" stroke-opacity="0.44"/>
      <text x="976" y="348" fill="#bbf7d0" font-size="17" font-weight="700">sync.crm</text>
      <text x="976" y="372" fill="#e5edf7" font-size="17">sync-crm-on-user-created</text>
    </g>

    <g>
      <rect x="950" y="416" width="236" height="76" rx="14" fill="#10231d" stroke="#22c55e" stroke-opacity="0.44"/>
      <text x="976" y="448" fill="#bbf7d0" font-size="17" font-weight="700">index.search</text>
      <text x="976" y="472" fill="#e5edf7" font-size="17">index-user-on-user-created</text>
    </g>

    <g>
      <rect x="112" y="492" width="338" height="92" rx="16" fill="#111f33" stroke="#60a5fa" stroke-opacity="0.22"/>
      <text x="136" y="522" fill="#bfdbfe" font-size="17" font-weight="700">Regla</text>
      <text x="136" y="548" fill="#e5edf7" font-size="19">una cola, un consumidor logico</text>
      <text x="136" y="574" fill="#e5edf7" font-size="19">varias instancias si hace falta</text>
    </g>

    <g>
      <rect x="506" y="492" width="400" height="74" rx="16" fill="#111f33" stroke="#60a5fa" stroke-opacity="0.22"/>
      <text x="530" y="522" fill="#bfdbfe" font-size="17" font-weight="700">Lectura operacional</text>
      <text x="530" y="548" fill="#e5edf7" font-size="19">que paso, quien reacciona y que accion ejecuta</text>
    </g>
  </g>
</svg>
